services:
  database:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: password
      POSTGRES_DB: projectdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d projectdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    image: ${DOCKERHUB_USERNAME:-local}/dorm-issue-backend:latest
    container_name: backend_app
    depends_on:
      database:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: appuser
      DB_PASSWORD: password
      DB_NAME: projectdb
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend/Dockerfile
    image: ${DOCKERHUB_USERNAME:-local}/dorm-issue-frontend:latest
    container_name: frontend_app
    depends_on:
      backend:
        condition: service_started
    ports:
      - "4173:4173"

volumes:
  postgres_data:
